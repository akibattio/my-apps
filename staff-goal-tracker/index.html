<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週次目標トラッカー</title>
<style>
  :root{
    --navy:#1f2d4a;
    --navy-2:#2c3e63;
    --cyan:#1bb6c1;
    --line:#dfe3ea;
    --ink:#23272f;
    --muted:#7b828e;
    --bg:#f4f6f9;
    --ok:#2e9e5b;
    --warn:#d8a72a;
    --bad:#c8513e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;
  }
  header{
    background:var(--navy);color:#fff;padding:9px 20px;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.02em;}
  header .sub{color:#aeb8cc;font-size:12px;}
  .bar{
    background:#fff;border-bottom:1px solid var(--line);
    padding:8px 20px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;
  }
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:11px;color:var(--muted);font-weight:600;}
  select,input,textarea{
    font-family:inherit;font-size:14px;border:1px solid var(--line);
    border-radius:6px;padding:7px 9px;background:#fff;color:var(--ink);
  }
  select:focus,input:focus,textarea:focus{outline:2px solid var(--cyan);outline-offset:-1px;}
  button{
    font-family:inherit;cursor:pointer;border:none;border-radius:6px;
    padding:8px 14px;font-size:13px;font-weight:600;
  }
  .btn-primary{background:var(--cyan);color:#fff;}
  .btn-ghost{background:#eef1f5;color:var(--navy);}
  .btn-mini{padding:4px 9px;font-size:12px;background:#eef1f5;color:var(--navy);}
  .btn-danger{background:#fff;color:var(--bad);border:1px solid var(--bad);}
  main{padding:14px 20px;max-width:1600px;margin:0 auto;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:18px;}
  .card h2{font-size:14px;margin:0 0 12px;color:var(--navy);display:flex;align-items:center;gap:8px;}
  .card h2 .tag{font-size:10px;background:var(--navy);color:#fff;padding:2px 7px;border-radius:4px;font-weight:600;}

  table{width:100%;border-collapse:collapse;}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top;}
  th{font-size:11px;color:var(--muted);font-weight:600;background:#fafbfc;}
  td.num{text-align:right;font-variant-numeric:tabular-nums;}

  .goal-row td input{width:100%;}
  .month-summary{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;}
  .kpi{flex:1;min-width:150px;border:1px solid var(--line);border-radius:8px;padding:12px;}
  .kpi .name{font-size:12px;color:var(--muted);}
  .kpi .val{font-size:20px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums;}
  .kpi .val small{font-size:12px;color:var(--muted);font-weight:500;}
  .progress{height:8px;background:#eef1f5;border-radius:5px;overflow:hidden;margin-top:8px;}
  .progress span{display:block;height:100%;background:var(--cyan);}

  .week{border:1px solid var(--line);border-radius:9px;padding:14px;margin-bottom:12px;}
  .week.done{border-color:#cfe6d6;background:#fafdfb;}
  .week-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .week-head .wk{font-weight:700;color:var(--navy);}
  .week-head .period{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .week-head .rate{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid2 .col h4{margin:0 0 6px;font-size:11px;color:var(--muted);}
  .plan-col{background:#fbfcfe;}
  .num-line{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .num-line label{font-size:12px;color:var(--muted);min-width:74px;}
  .num-line input{width:110px;text-align:right;}
  textarea{width:100%;min-height:54px;resize:vertical;}
  .rate-pill{padding:2px 8px;border-radius:10px;font-size:12px;color:#fff;}
  .feedback{margin-top:10px;}
  .feedback h4{margin:0 0 4px;font-size:11px;color:var(--muted);}
  .empty{color:var(--muted);text-align:center;padding:30px;}
  .row-actions{display:flex;gap:8px;align-items:center;}
  .hint{font-size:11px;color:var(--muted);}
  .saved-flash{color:var(--ok);font-size:12px;font-weight:600;opacity:0;transition:opacity .2s;}
  .saved-flash.show{opacity:1;}
  footer{max-width:1600px;margin:0 auto;padding:0 20px 40px;color:var(--muted);font-size:11px;}

  /* タブ */
  .tabs{background:var(--navy-2);display:flex;gap:2px;padding:0 20px;}
  .tabs button{background:transparent;color:#aeb8cc;border-radius:0;padding:11px 18px;font-weight:600;border-bottom:3px solid transparent;}
  .tabs button.active{color:#fff;border-bottom-color:var(--cyan);}
  .role-switch{display:flex;margin-left:auto;border:1px solid #41507a;border-radius:7px;overflow:hidden;}
  .role-switch button{background:transparent;color:#aeb8cc;padding:6px 14px;border-radius:0;font-size:12px;}
  .role-switch button.active{background:var(--cyan);color:#fff;}
  .subtabs{display:flex;gap:8px;margin:0;flex-wrap:wrap;}
  .subtabs button{background:#fff;border:1px solid var(--line);color:var(--muted);padding:8px 18px;border-radius:8px;font-weight:600;font-size:13px;}
  .subtabs button.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .biz-switch{display:flex;gap:0;margin:0;border:1px solid var(--cyan);border-radius:9px;overflow:hidden;width:fit-content;}
  .biz-switch button{background:#fff;color:var(--cyan);padding:9px 22px;border-radius:0;font-weight:700;font-size:13px;}
  .biz-switch button.active{background:var(--cyan);color:#fff;}

  /* サマリー */
  .sum-table{width:100%;border-collapse:collapse;font-size:13px;}
  .sum-table th,.sum-table td{padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .sum-table th{font-size:11px;color:var(--muted);background:#fafbfc;text-align:right;}
  .sum-table th.l,.sum-table td.l{text-align:left;}
  .sum-table td{text-align:right;font-variant-numeric:tabular-nums;}
  .sum-table tr.dept td{background:var(--navy);color:#fff;font-weight:700;text-align:left;font-size:12px;letter-spacing:.04em;}
  .sum-table tr.total td{background:#f0f3f7;font-weight:700;}
  .sum-table .nm{font-weight:600;color:var(--ink);}
  .sum-table .mt{color:var(--muted);font-size:11px;}
  .ratebadge{display:inline-block;min-width:42px;text-align:center;color:#fff;border-radius:10px;padding:1px 7px;font-size:12px;font-weight:600;}
  .scroll-x{overflow-x:auto;}
  .mini-cell{font-size:12px;}
  .mini-cell small{display:block;color:var(--muted);font-size:10px;}

  /* 月次KPI表（見やすさ強化） */
  .kpi-month{width:100%;border-collapse:collapse;font-size:14px;}
  .kpi-month th,.kpi-month td{padding:12px 16px;border-bottom:1px solid var(--line);text-align:right;}
  .kpi-month thead th{background:#fafbfc;color:var(--muted);font-size:12px;font-weight:600;border-bottom:1px solid var(--line);}
  .kpi-month th.l,.kpi-month td.l{text-align:left;}
  .kpi-month td.l{font-weight:700;font-size:14px;color:var(--ink);}
  .kpi-month td.l small{color:var(--muted);font-weight:400;font-size:11px;}
  .kpi-month .sep{border-left:2px solid #e3e7ee;}
  .kpi-month .g-sum{background:#eef9fb;}
  .kpi-month thead .g-sumh{background:#dcf2f5;color:var(--navy);}
  .kpi-month tbody tr:hover td{background:#fafdfe;}
  .kpi-month tbody tr:hover td.g-sum{background:#e3f4f7;}
  .kpi-month td.val{font-variant-numeric:tabular-nums;}
  .kpi-month td.actual{font-weight:700;color:var(--navy);}

  /* 月次KPIカード */
  .kpi-cards{display:flex;gap:14px;flex-wrap:wrap;}
  .kpi-card{flex:1;min-width:260px;border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:#fff;}
  .kpi-card .ttl{font-weight:700;color:var(--navy);font-size:15px;margin-bottom:8px;}
  .kpi-card .ttl small{color:var(--muted);font-weight:400;font-size:11px;}
  .kpi-card .big{font-size:26px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .kpi-card .big small{font-size:13px;font-weight:600;color:var(--muted);}
  .kpi-card .pbar{height:8px;background:#eef1f5;border-radius:5px;overflow:hidden;margin:10px 0;display:flex;}
  .kpi-card .pbar span{display:block;height:100%;}
  .kpi-card .bd{display:flex;gap:8px;}
  .kpi-card .bd>div{flex:1;background:#fafbfc;border-radius:7px;padding:7px 9px;font-size:12px;}
  .kpi-card .bd .lab{color:var(--muted);font-weight:600;margin-bottom:2px;}
  .kpi-card .bd .nums{font-variant-numeric:tabular-nums;}
  .kpi-card .bd .nums b{color:var(--navy);}

  /* 案件一覧 */
  .deal-table{width:100%;border-collapse:collapse;font-size:13px;}
  .deal-table th,.deal-table td{padding:7px 9px;border-bottom:1px solid var(--line);}
  .deal-table th{font-size:11px;color:var(--muted);background:#fafbfc;text-align:left;}
  .deal-table td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .status-chip{display:inline-block;font-size:11px;padding:1px 8px;border-radius:10px;background:#eef1f5;color:var(--navy);}
  .status-chip.win{background:#e3f3e9;color:var(--ok);}
  .status-chip.deliver{background:#e6eefb;color:var(--navy-2);}

  /* モーダル */
  .modal-bg{position:fixed;inset:0;background:rgba(20,28,48,.5);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto;}
  .modal{background:#fff;border-radius:12px;max-width:820px;width:100%;padding:22px;}
  .modal h3{margin:0 0 4px;color:var(--navy);font-size:16px;}
  .modal .map-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
  .modal .map-grid .field{gap:4px;}
  .modal select{width:100%;}
  .prev-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px;}
  .prev-table th,.prev-table td{border:1px solid var(--line);padding:4px 7px;text-align:left;white-space:nowrap;}
  .prev-table th{background:#fafbfc;color:var(--muted);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
  .warn-line{color:var(--warn);font-size:12px;}
</style>
</head>
<body>
<header>
  <h1>週次目標トラッカー</h1>
  <span class="sub">月次目標を週に分けて、毎週ふりかえる</span>
  <span class="saved-flash" id="flash">保存しました</span>
  <div class="role-switch">
    <button id="roleStaff" class="active">スタッフ</button>
    <button id="roleAdmin">管理者</button>
  </div>
</header>

<div class="tabs">
  <button id="tabDetail" class="active">個別ページ</button>
  <button id="tabSummary">サマリー</button>
</div>

<div class="bar" id="summaryBar" style="display:none;">
  <div class="field">
    <label>対象期</label>
    <select id="fySel"></select>
  </div>
  <div class="field" style="margin-left:auto;">
    <label> </label>
    <div class="row-actions">
      <button class="btn-ghost btn-mini" id="csvBtn2">CSV取込</button>
      <button class="btn-ghost btn-mini" id="exportBtn2">バックアップ書出</button>
    </div>
  </div>
</div>

<div class="bar" id="detailBar">
  <div class="field">
    <label>スタッフ</label>
    <select id="staffSel"></select>
  </div>
  <div class="field">
    <label> </label>
    <button class="btn-ghost" id="addStaff">＋ スタッフ追加</button>
  </div>
  <div class="field">
    <label>対象月</label>
    <input type="month" id="monthSel">
  </div>
  <div class="field" style="margin-left:auto;">
    <label> </label>
    <div class="row-actions">
      <button class="btn-ghost btn-mini" id="demoBtn">デモ案件投入</button>
      <button class="btn-ghost btn-mini" id="csvBtn">CSV取込</button>
      <button class="btn-ghost btn-mini" id="exportBtn">バックアップ書出</button>
      <button class="btn-ghost btn-mini" id="importBtn">読込</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
  </div>
</div>

<main id="app"></main>
<input type="file" id="csvFile" accept=".csv,text/csv" style="display:none;">
<div id="modalRoot"></div>
<footer>
  データはこのブラウザ内（localStorage）にだけ保存されます。別PCと共有したいときは「バックアップ書出」でファイル化して渡してください。
</footer>

<script>
const $ = (s,el=document)=>el.querySelector(s);
const KEY = "wgt_data_v3";
const WEEK_LABELS = ["第1週","第2週","第3週","第4週","第5週","第6週"];

// 対象月を「月曜はじまり・日曜おわり・月をまたがない」で週に分割
function weeksOfMonth(ym){
  const [y,mo] = ym.split("-").map(Number);
  const lastDay = new Date(y, mo, 0).getDate();
  const out = [];
  let start = 1;
  while(start <= lastDay){
    const dow = new Date(y, mo-1, start).getDay(); // 0=日,1=月…6=土
    const toSun = (7 - dow) % 7;                    // その週の日曜まで
    let end = start + toSun;
    if(end > lastDay) end = lastDay;
    out.push({ start, end });
    start = end + 1;
  }
  return out; // 例）4〜6週
}
function periodLabel(p, ym){
  const mo = Number(ym.split("-")[1]);
  return `${mo}/${p.start}〜${mo}/${p.end}`;
}

// ---- 期（10月開始・翌9月締め）まわり ----
const pad=n=>String(n).padStart(2,"0");
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function curFY(){ const d=new Date(); return (d.getMonth()+1)>=10 ? d.getFullYear() : d.getFullYear()-1; }
function fyOfMonth(ym){ const [y,mo]=ym.split("-").map(Number); return mo>=10 ? y : y-1; }
function prevMonth(ym){ const [y,mo]=ym.split("-").map(Number); const py=mo===1?y-1:y, pm=mo===1?12:mo-1; return `${py}-${pad(pm)}`; }
const SALES_KPI_DEFAULT = [
  {name:"粗利（新規）",unit:"千円",target:"",actual:""},
  {name:"粗利（既存）",unit:"千円",target:"",actual:""},
  {name:"案件化（新規）",unit:"件",target:"",actual:""},
  {name:"案件化（既存）",unit:"件",target:"",actual:""},
  {name:"アポ（新規）",unit:"件",target:"",actual:""},
  {name:"アポ（既存）",unit:"件",target:"",actual:""},
];
// 粗利合計＝新規＋既存（集計・週次基準で使用）
const GROSS_NAMES=["粗利（新規）","粗利（既存）"];
const CASE_NAMES=["案件化（新規）","案件化（既存）"];
const APO_NAMES=["アポ（新規）","アポ（既存）"];
function kpiSum(kpi, names, field){ return (kpi||[]).filter(k=>names.includes(k.name)).reduce((s,k)=>s+(Number(k[field])||0),0); }
function ensureSalesMonth(staffId, ym){
  const k=staffId+"|sales|"+ym;
  if(!db.months[k]) db.months[k]={goals:null,weeks:[],kpi:JSON.parse(JSON.stringify(SALES_KPI_DEFAULT)),channels:{}};
  const m=db.months[k];
  if(!m.kpi) m.kpi=JSON.parse(JSON.stringify(SALES_KPI_DEFAULT));
  if(!m.channels) m.channels={};
  return m;
}
// 目標値だけをコピー（実績はコピーしない）
function copyTargetsBetween(srcM, dstM){
  if(!srcM) return;
  if(srcM.kpi){ srcM.kpi.forEach(sk=>{ let dk=dstM.kpi.find(x=>x.name===sk.name); if(!dk){ dk={name:sk.name,unit:sk.unit,target:"",actual:""}; dstM.kpi.push(dk); } dk.target=sk.target; }); }
  if(srcM.channels){ Object.keys(srcM.channels).forEach(ch=>{ if(!dstM.channels[ch]) dstM.channels[ch]={}; dstM.channels[ch].caseT=srcM.channels[ch].caseT; dstM.channels[ch].apoT=srcM.channels[ch].apoT; }); }
}
// 上半期(H1)=10,11,12,1,2,3 / 下半期(H2)=4,5,6,7,8,9
function halfMonths(fyStart, half){
  if(half==="H2") return [4,5,6,7,8,9].map(m=>`${fyStart+1}-${pad(m)}`);
  return [[fyStart,10],[fyStart,11],[fyStart,12],[fyStart+1,1],[fyStart+1,2],[fyStart+1,3]].map(([y,m])=>`${y}-${pad(m)}`);
}
function fyMonths(fyStart){ return [...halfMonths(fyStart,"H1"), ...halfMonths(fyStart,"H2")]; }
// 副作用なしの読み取り（getMonthはテンプレ自動投入の副作用があるため集計には使わない）
function readActual(staffId, ym){
  const m = db.months[staffId+"|"+ym];
  if(!m || !m.weeks) return 0;
  const need = weeksOfMonth(ym).length;
  return m.weeks.slice(0,need).reduce((s,w)=>s+(Number(w.actual)||0),0);
}
function staffMonthTarget(s, ym){
  if(!s) return "";
  if(s.targets && s.targets[ym]!=null && s.targets[ym]!=="") return s.targets[ym];
  return s.monthlyTarget;
}
function readTarget(staffId, ym){
  const m = db.months[staffId+"|"+ym];
  if(m && m.goals && m.goals.length && m.goals[0].target!=="" ) return Number(m.goals[0].target)||0;
  const s = db.staff.find(x=>x.id===staffId);
  return Number(staffMonthTarget(s, ym))||0;
}
function sumHalf(staffId, fyStart, half){
  let t=0,a=0;
  halfMonths(fyStart,half).forEach(ym=>{ t+=readTarget(staffId,ym); a+=readActual(staffId,ym); });
  return {target:t, actual:a};
}
// 営業（受注）の月次達成：粗利目標と実績（継続込み）。個別ページの年間タブと同じ集計
function salesMonthAch(staffId, ym){
  const mm=db.months[staffId+"|sales|"+ym], kpi=mm&&mm.kpi?mm.kpi:[];
  const target=kpiSum(kpi, GROSS_NAMES, "target");
  const A=salesDealActual(staffId,ym);
  const actual=(A["粗利（新規）"]||0)+(A["粗利（既存）"]||0)+recurringMonthlyTotal(staffId,ym);
  return {target, actual};
}

let db = load();
if(!db.deals) db.deals = [];   // CSV取込の案件データ（納品）
if(!db.pipeline) db.pipeline = [];  // 営業の案件パイプライン（ヨミ管理）
if(!db.recurring) db.recurring = [];  // 営業の継続案件（定期契約・期間で計上）
if(!db.reports) db.reports = {};      // 日報（key: staffId|YYYY-MM-DD → {notice, plan, fb}）
if(!db.channels) db.channels = ["既存","WEB","紹介","交流会","レディクル","代理店","展示会","アイミツ","その他"];  // チャネルマスタ（管理者が編集）
if(!db.members) db.members = db.staff.map(s=>s.name);  // メンバーマスタ（パス元の選択肢・管理者が編集）
let cur = { staff:null, month:null, view:"detail", fyStart:curFY(), role:"staff", detailTab:"input", biz:"sales", pipeKind:"all", dealView:"pipeline", reportDate:todayStr() };

function load(){
  try{ const d = JSON.parse(localStorage.getItem(KEY)); if(d&&d.staff) return d; }catch(e){}
  return seed();
}
function seed(){
  const FY = curFY();                 // 2026-06時点なら 2025（2025年10月〜2026年9月期）
  const fyMs = fyMonths(FY);           // ["2025-10",...,"2026-09"]（期=10月→9月の順）
  // 納品（粗利）月次目標 — 期順の12か月（千円）
  const NOUHIN = {
    "田上智也":   [2500,2400,2400,2000,2000,2000,2300,2300,2300,2300,2300,2300],
    "能島青也":   [600,700,700,700,800,800,1500,1500,1500,2000,2000,2000],
    "今井紗也華": [600,700,700,700,800,800,750,700,800,800,800,800],
    "土田清太郎": [2700,2700,2700,2700,2700,2700,2700,2700,2700,2700,2700,2700],
    "須藤理代":   [2450,2450,2450,2450,2450,2450,2600,2600,2600,2600,2600,2600],
    "古賀理一郎": [200,200,1000,1800,1800,1800,2250,2250,2250,1950,1950,1950],
    "工藤心太":   [500,500,550,550,550,550,800,800,800,800,800,800],
  };
  // 受注担当の従来の月平均（受注の月次表が来たら同様に月別化）
  const JUCHU_AVG = {"二宮":4050,"藤井":3150,"田嶋":2800};
  // [事業部, 氏名, 指標, 注記]
  const roster = [
    ["DM","二宮","受注",""],

function uid(){ return Math.random().toString(36).slice(2,9); }

function curMonthStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
}
// 納品（ディレクター）は従来キー、営業は別キー空間にして既存集計を壊さない
function monthKey(){ return cur.biz==="sales" ? cur.staff+"|sales|"+cur.month : cur.staff+"|"+cur.month; }
function getMonth(){
  const k = monthKey();
  if(!db.months[k]) db.months[k] = { goals:null, weeks:[] };
  const m = db.months[k];
  if(!m.weeks) m.weeks = [];
  // その月の週数に合わせて入力枠を確保（既存の入力は保持）
  const need = weeksOfMonth(cur.month).length;
  while(m.weeks.length < need) m.weeks.push(weekObj());
  if(cur.biz==="sales"){
    if(!m.kpi) m.kpi = JSON.parse(JSON.stringify(SALES_KPI_DEFAULT));
  } else if(m.goals==null){
    // 初回はその月の目標テンプレを自動投入（以後は手動編集を尊重）
    const s = db.staff.find(x=>x.id===cur.staff);
    const tgt = staffMonthTarget(s, cur.month);
    m.goals = (s && tgt!=="" && tgt!=null) ? [{name:s.metric+"数字", target:tgt, unit:"千円"}] : [];
  }
  return m;
}
function weekObj(){ return { planTarget:"", planAction:"", actual:"", doneAction:"", feedback:"" }; }

/* ---------- サマリービュー ---------- */
function ratebadge(rate){
  return `<span class="ratebadge" style="background:${rateColor(rate)}">${rate}%</span>`;
}
function rateOf(actual,target){ return target>0 ? Math.round(actual/target*100) : 0; }

function renderSummaryView(app){
  const fy = cur.fyStart;
  const depts = [...new Set(db.staff.map(s=>s.dept||"その他"))];

  // 1) 半期サマリー
  const c1 = card("半期サマリー（上半期 10〜3月 / 下半期 4〜9月）","HALF");
  // 受注と納品は別物なので合算せず、指標ごとに小計する
  const newBucket=()=>({h1t:0,h1a:0,h2t:0,h2a:0});
  const add=(b,h1,h2)=>{ b.h1t+=h1.target;b.h1a+=h1.actual;b.h2t+=h2.target;b.h2a+=h2.actual; };
  const totalByMetric={};   // 全社の指標別
  const totalRow=(label,b)=>`<tr class="total">
      <td class="l">${esc(label)}</td><td></td><td>${fmt(b.h1t+b.h2t)}</td>
      <td>${fmt(b.h1t)}</td><td>${fmt(b.h1a)}</td><td>${ratebadge(rateOf(b.h1a,b.h1t))}</td>
      <td>${fmt(b.h2t)}</td><td>${fmt(b.h2a)}</td><td>${ratebadge(rateOf(b.h2a,b.h2t))}</td>
      <td>${fmt(b.h1a+b.h2a)}</td><td>${ratebadge(rateOf(b.h1a+b.h2a,b.h1t+b.h2t))}</td></tr>`;
  let rows = `<tr>
      <th class="l">スタッフ</th><th class="l">指標</th><th>通期目標</th>
      <th>上半期 目標</th><th>上半期 実績</th><th>達成</th>
      <th>下半期 目標</th><th>下半期 実績</th><th>達成</th>
      <th>通期 実績</th><th>達成</th></tr>`;
  depts.forEach(d=>{
    rows += `<tr class="dept"><td colspan="11">${esc(d)}</td></tr>`;
    const members = db.staff.filter(s=>(s.dept||"その他")===d);
    const dtByMetric={};   // 事業部内の指標別
    members.forEach(s=>{
      const h1=sumHalf(s.id,fy,"H1"), h2=sumHalf(s.id,fy,"H2");
      const yt=h1.target+h2.target, ya=h1.actual+h2.actual;
      rows += `<tr>
        <td class="l nm">${esc(s.name)}</td>
        <td class="l mt">${esc(s.metric||"")}</td>
        <td>${fmt(yt)}</td>
        <td>${fmt(h1.target)}</td><td>${fmt(h1.actual)}</td><td>${ratebadge(rateOf(h1.actual,h1.target))}</td>
        <td>${fmt(h2.target)}</td><td>${fmt(h2.actual)}</td><td>${ratebadge(rateOf(h2.actual,h2.target))}</td>
        <td>${fmt(ya)}</td><td>${ratebadge(rateOf(ya,yt))}</td></tr>`;
      const mk=s.metric||"その他";
      add(dtByMetric[mk]||(dtByMetric[mk]=newBucket()), h1, h2);
      add(totalByMetric[mk]||(totalByMetric[mk]=newBucket()), h1, h2);
    });
    Object.keys(dtByMetric).forEach(mk=>{ rows += totalRow(`${d} ${mk} 計`, dtByMetric[mk]); });
  });
  Object.keys(totalByMetric).forEach(mk=>{ rows += totalRow(`全社 ${mk} 計`, totalByMetric[mk]); });
  const wrap1=document.createElement("div"); wrap1.className="scroll-x";
  wrap1.innerHTML=`<table class="sum-table">${rows}</table>
    <div class="hint" style="margin-top:8px;">数値はすべて千円。受注と納品は別指標のため合算せず、指標ごとに小計します。達成バッジは実績÷目標（緑100%以上・黄70%以上・赤それ未満）。</div>`;
  c1.appendChild(wrap1);

  // 2) 月別実績グリッド
  const months = fyMonths(fy);
  const c2 = card("月別の実績（達成率）","MONTHLY");
  let head = `<tr><th class="l">スタッフ</th>` +
    months.map(ym=>`<th>${Number(ym.split("-")[1])}月</th>`).join("") + `</tr>`;
  let body = "";
  depts.forEach(d=>{
    body += `<tr class="dept"><td colspan="${months.length+1}">${esc(d)}</td></tr>`;
    db.staff.filter(s=>(s.dept||"その他")===d).forEach(s=>{
      body += `<tr><td class="l nm">${esc(s.name)}</td>` + months.map(ym=>{
        const a=readActual(s.id,ym), t=readTarget(s.id,ym);
        if(a===0) return `<td class="mini-cell mt">–</td>`;
        return `<td class="mini-cell">${fmt(a)}<small>${ratebadge(rateOf(a,t))}</small></td>`;
      }).join("") + `</tr>`;
    });
  });
  const wrap2=document.createElement("div"); wrap2.className="scroll-x";
  wrap2.innerHTML=`<table class="sum-table">${head}${body}</table>
    <div class="hint" style="margin-top:8px;">実績の入っていない月は「–」。各セルは実績（千円）と達成率。</div>`;
  c2.appendChild(wrap2);

  // 2.5) 営業（受注）の月別達成率（粗利・継続込み）。スタッフ×月の個別達成率
  const salesStaff = db.staff.filter(s=>s.metric==="受注");
  let c25=null;
  if(salesStaff.length){
    c25 = card("営業（受注）月別の達成率（粗利・継続込み）","受注月次");
    const sHead = `<tr><th class="l">スタッフ</th>` +
      months.map(ym=>`<th>${Number(ym.split("-")[1])}月</th>`).join("") + `<th>通期</th></tr>`;
    let sBody="";
    const sDepts=[...new Set(salesStaff.map(s=>s.dept||"その他"))];
    sDepts.forEach(d=>{
      sBody += `<tr class="dept"><td colspan="${months.length+2}">${esc(d)}</td></tr>`;
      salesStaff.filter(s=>(s.dept||"その他")===d).forEach(s=>{
        let yt=0,ya=0;
        const cells = months.map(ym=>{
          const {actual,target}=salesMonthAch(s.id,ym); yt+=target; ya+=actual;
          if(target<=0 && actual<=0) return `<td class="mini-cell mt">–</td>`;
          return `<td class="mini-cell">${fmt(actual)}<small>${ratebadge(rateOf(actual,target))}</small></td>`;
        }).join("");
        sBody += `<tr><td class="l nm">${esc(s.name)}</td>${cells}<td class="mini-cell"><b>${fmt(ya)}</b><small>${ratebadge(rateOf(ya,yt))}</small></td></tr>`;
      });
    });
    const wrap25=document.createElement("div"); wrap25.className="scroll-x";
    wrap25.innerHTML=`<table class="sum-table">${sHead}${sBody}</table>
      <div class="hint" style="margin-top:8px;">各セルは粗利実績（千円・継続込み）と達成率。目標は「目標」タブ、実績は案件から自動集計。個別ページの年間タブと同じ集計です。</div>`;
    c25.appendChild(wrap25);
  }

  // 月次を上に、半期サマリーをその下に並べる
  if(c25) app.appendChild(c25);
  app.appendChild(c2);
  app.appendChild(c1);

  // 3) メンバー管理（パス元の選択肢マスタ）
  app.appendChild(memberCard());
}

        const[n,t,u]=tr.querySelectorAll("input");

        t.oninput=e=>{g.target=e.target.value===""?"":Number(e.target.value);save();updateSummary(m);updateWeekCheck(m);};
        u.oninput=e=>{g.unit=e.target.value;save();};
        tr.querySelector("button").onclick=()=>{m.goals.splice(i,1);save();draw();updateSummary(m);};
        tb.appendChild(tr);
      });
      if(!m.goals.length) tb.innerHTML=`<tr><td colspan="4" class="hint">まだ指標がありません。「＋ 指標を追加」から登録してください。</td></tr>`;
    };
    draw();
    $("#addGoal",body).onclick=()=>{ m.goals.push({name:"",target:"",unit:""}); save(); draw(); };
  });
  return c;
}

/* 週次 */
// 営業の週次目標は「粗利目標 − 継続案件の月額＝今月の獲得目標」
function monthMainTarget(m){
  if(cur.biz==="sales"){
    const gross = kpiSum(m.kpi, GROSS_NAMES, "target");   // 粗利合計＝新規＋既存
    const rec = recurringMonthlyTotal(cur.staff, cur.month);
    return Math.max(0, gross - rec);
  }
  return (m.goals && m.goals[0]) ? Number(m.goals[0].target)||0 : 0;
}
// 週次の実績＝その週に受注した粗利の合計（案件のorderDateから自動集計）
function weekGrossActual(staffId, ym, period){
  let s=0;
  db.pipeline.filter(d=>d.staffId===staffId).forEach(d=>{
    const od=""+(d.orderDate||"");
    if(!od.startsWith(ym)) return;
    const day=Number(od.split("-")[2]);
    if(day>=period.start && day<=period.end) s+=dealGross(d);
  });
  return s;
}
// その週に受注した案件の明細（受注日・クライアント・案件名・受注粗利）
function weekDeals(staffId, ym, period){
  const out=[];
  db.pipeline.filter(d=>d.staffId===staffId).forEach(d=>{
    const od=""+(d.orderDate||"");
    if(!od.startsWith(ym)) return;
    const day=Number(od.split("-")[2]);
    if(day>=period.start && day<=period.end) out.push({date:od, client:d.client||"", name:dealContent(d), gross:dealGross(d), kind:"受注"});
  });
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}
// 該当月に有効な継続案件（第1週に計上）
function recurringActiveList(staffId, ym){
  return db.recurring.filter(r=>r.staffId===staffId && recurringActive(r,ym))
    .map(r=>({date:"継続", client:r.client||"", name:r.name||"", gross:recIndividual(r), kind:"継続"}));
}
// 契約内容の明細リスト（実績の右に表示）

    <tr><th class="l">受注日</th><th class="l">クライアント</th><th class="l">案件名</th><th style="text-align:right;">粗利</th></tr>
    ${items.map(it=>`<tr><td class="l">${it.kind==="継続"?'<span class="status-chip">継続</span>':esc(it.date.slice(5))}</td><td class="l">${esc(it.client)}</td><td class="l">${esc(it.name)}</td><td style="text-align:right;">${fmt(it.gross)}</td></tr>`).join("")}
    <tr style="font-weight:700;border-top:1px solid var(--line);"><td class="l" colspan="3">合計</td><td style="text-align:right;">${fmt(tot)}</td></tr>

function weekCheckHtml(m){
  const need = weeksOfMonth(cur.month).length;
  const sum = m.weeks.slice(0,need).reduce((s,w)=>s+(Number(w.planTarget)||0),0);
  const mt = monthMainTarget(m);
  const diff = sum - mt;
  let color, msg;
  if(mt===0){ color="var(--muted)"; msg="目標が未設定です"; }
  else if(diff===0){ color="var(--ok)"; msg="週次の合計が獲得目標と一致しています"; }
  else if(diff<0){ color="var(--warn)"; msg=`獲得目標まで あと ${fmt(-diff)}（週次の積み上げが不足）`; }
  else { color="var(--bad)"; msg=`獲得目標を ${fmt(diff)} 超過`; }
  if(cur.biz==="sales"){
    const gross=kpiSum(m.kpi, GROSS_NAMES, "target");
    const rec=recurringMonthlyTotal(cur.staff,cur.month);

       <span style="color:${color};font-weight:600;">${msg}</span></div>`;

     週次目標の合計 <b>${fmt(sum)}</b> ／ 月次目標 ${fmt(mt)} 千円

function splitWeeklyEven(m){
  const need = weeksOfMonth(cur.month).length;
  const acq = monthMainTarget(m);   // 月次の獲得目標（粗利合計−継続）
  if(acq<=0 || !need) return;
  const per = Math.round(acq/need);
  for(let i=0;i<need;i++){ m.weeks[i].planTarget = (i===need-1) ? acq-per*(need-1) : per; }
  save();
}

function miniKpi(label,a,t){
  const r=rateOf(a,t);
  return `<div class="kpi">
    <div class="name">${label}</div>
    <div class="val">${fmt(a)} <small>/ ${fmt(t)} 千円</small></div>
    <div class="progress"><span style="width:${Math.min(r,100)}%;background:${rateColor(r)}"></span></div>
    <div class="hint" style="margin-top:4px;">達成率 ${r}%</div></div>`;
}
function barChartSVG(rows,maxV){
  const W=720,H=210,padB=26,padT=14,chartH=H-padB-padT;
  const n=rows.length, slot=W/n;
  let bars="";
  rows.forEach((r,i)=>{
    const x=i*slot, bw=slot*0.3;
    const th=r.t/maxV*chartH, ah=r.a/maxV*chartH;
    const x1=x+slot/2-bw-2, x2=x+slot/2+2;
    bars+=`<rect x="${x1.toFixed(1)}" y="${(padT+chartH-th).toFixed(1)}" width="${bw.toFixed(1)}" height="${th.toFixed(1)}" fill="#c8d0db"/>`;
    if(r.a>0){ const col=rateColor(rateOf(r.a,r.t));
      bars+=`<rect x="${x2.toFixed(1)}" y="${(padT+chartH-ah).toFixed(1)}" width="${bw.toFixed(1)}" height="${ah.toFixed(1)}" fill="${col}"/>`; }
    bars+=`<text x="${(x+slot/2).toFixed(1)}" y="${H-8}" font-size="11" fill="#7b828e" text-anchor="middle">${r.mo}</text>`;
  });
  return `<div class="scroll-x"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:560px;height:auto;">
      <line x1="0" y1="${padT+chartH}" x2="${W}" y2="${padT+chartH}" stroke="#e3e7ee"/>${bars}
    </svg></div>
    <div class="hint" style="margin:4px 0 12px;">
      <span style="display:inline-block;width:10px;height:10px;background:#c8d0db;vertical-align:middle;margin-right:4px;"></span>目標
      <span style="display:inline-block;width:10px;height:10px;background:var(--cyan);vertical-align:middle;margin:0 4px 0 12px;"></span>実績（バーの色は達成率）</div>`;
}

  });
  const getK=(mo,nm)=>mo.kpi.find(k=>k.name===nm);

  const note=document.createElement("div"); note.className="hint"; note.style.marginBottom="10px";
  note.textContent="1年分の目標をまとめて入力できます。各行の「→右へ」で、先頭（10月）に入れた数字を残り月へ一括展開します（毎月同じ数字のとき便利）。";
  c.appendChild(note);

  const box=document.createElement("div"); box.className="scroll-x";
  const head=`<tr><th class="l">指標</th><th></th>${moLabels.map(l=>`<th>${l}</th>`).join("")}<th>合計</th></tr>`;
  box.innerHTML=`<table class="sum-table" style="min-width:1040px;"><thead>${head}</thead><tbody id="tgtGrid"></tbody></table>`;
  c.appendChild(box);

  const draw=()=>{
    const tb=$("#tgtGrid",box); tb.innerHTML="";
    TARGET_INDICATORS.forEach(([nm,u])=>{
      const tr=document.createElement("tr"); tr.dataset.row=nm;
      const cells=monthObjs.map((mo,i)=>`<td><input type="number" data-i="${i}" value="${getK(mo,nm).target??""}" placeholder="0" style="width:78px;text-align:right;"></td>`).join("");
      const total=monthObjs.reduce((s,mo)=>s+(Number(getK(mo,nm).target)||0),0);
      tr.innerHTML=`<td class="l nm">${nm}<small style="color:var(--muted);font-weight:400;">（${u}）</small></td><td><button class="btn-mini" data-copy="${nm}">→右へ</button></td>${cells}<td class="tot">${fmt(total)}</td>`;
      tb.appendChild(tr);
      tr.querySelectorAll("input").forEach(inp=>inp.oninput=e=>{
        getK(monthObjs[+inp.dataset.i],nm).target = e.target.value===""?"":Number(e.target.value);
        save();
        const t=monthObjs.reduce((s,mo)=>s+(Number(getK(mo,nm).target)||0),0);
        $('.tot',tr).textContent=fmt(t);
      });
      $('button[data-copy]',tr).onclick=()=>{ const v=getK(monthObjs[0],nm).target; monthObjs.forEach(mo=>getK(mo,nm).target=v); save(); draw(); };
    });
  };
  draw();
  return c;
}
// 案件（パイプライン）から月次実績を自動集計（粗利＝受注日／案件化＝提案日／アポ＝活動履歴の日付、新規・既存は属性で振り分け）
function salesDealActual(staffId, ym){
  const r={"粗利（新規）":0,"粗利（既存）":0,"案件化（新規）":0,"案件化（既存）":0,"アポ（新規）":0,"アポ（既存）":0};
  const inMonth=d=>!!d && (""+d).startsWith(ym);
  db.pipeline.filter(p=>p.staffId===staffId).forEach(p=>{
    const sfx = p.attribute==="新規" ? "（新規）" : "（既存）";
    if(inMonth(p.orderDate)) r["粗利"+sfx]+=dealGross(p);
    if(inMonth(p.proposalDate)) r["案件化"+sfx]+=1;
    (p.activities||[]).forEach(a=>{ if(inMonth(a.date)) r["アポ"+sfx]+=1; });
  });
  return r;
}
// パス実績：自分がパス元（紹介元）になっている案件で受注した分の集計（貢献度・自分の数字には合算しない）
function passStats(staffId, monthsList){
  const me=(db.staff.find(s=>s.id===staffId)||{}).name;
  let count=0, gross=0;
  if(me){
    db.pipeline.forEach(p=>{
      if(p.passFrom!==me || !p.orderDate) return;            // パス元＝自分・受注済みのみ
      if(monthsList && !monthsList.includes((""+p.orderDate).slice(0,7))) return;
      count++; gross += Number(p.grossTotal)||dealGross(p);
    });
  }
  return {count, gross};
}

      ${(()=>{ const W=tS>0?Math.min(100,rate):0; const wN=aS>0?W*aN/aS:0, wE=aS>0?W*(aE+cont)/aS:0;
        return `<div class="pbar" title="新規 ${fmt(aN)}／既存 ${fmt(aE+cont)}（継続込み）／目標 ${fmt(tS)}"><span style="width:${wN}%;background:#1f5fb0;"></span><span style="width:${wE}%;background:#bd6f24;"></span></div>`; })()}

    const spot=(A["粗利（新規）"]||0)+(A["粗利（既存）"]||0);   // 案件からの粗利実績
    const totalA=spot+rec;
    const rate=rateOf(totalA,gross);
    residual.innerHTML=`<div style="border-left:4px solid var(--cyan);background:#f0fbfc;padding:10px 13px;border-radius:6px;font-size:13px;line-height:1.9;">
      <div>粗利合計目標 <b>${fmt(gross)}</b> − 今月の継続 <b>${fmt(rec)}</b> ＝ <b style="color:var(--cyan);">今月の獲得目標 ${fmt(acq)}</b> 千円 <span class="hint">（新規・スポットで取る額。週次目標の基準）</span></div>
      <div>実績 案件 <b>${fmt(spot)}</b> ＋ 継続 <b>${fmt(rec)}</b> ＝ <b>合計 ${fmt(totalA)}</b> 千円　粗利達成 ${ratebadge(rate)}</div></div>`;
  };
  drawResidual();
  return c;
}

// 営業の実績分析（月別 目標/実績/達成率/GAP）
function readSalesMonth(staffId, ym){ return db.months[staffId+"|sales|"+ym] || null; }
function salesAnalysisCard(){
  const fy = fyOfMonth(cur.month);
  const c = card(`営業 年間実績（${fy}年10月〜${fy+1}年9月期）`,"年間");
  const months = fyMonths(fy);
  const moLabels = months.map(ym=>Number(ym.split("-")[1])+"月");
  const sumA = arr=>arr.reduce((s,v)=>s+v,0);

  // 各カテゴリの新規/既存の目標・実績（月別）。粗利の既存実績は継続込み
  const pick=(field,names)=>{const out=[];months.forEach(ym=>{const mm=readSalesMonth(cur.staff,ym);const kpi=mm&&mm.kpi?mm.kpi:[];const k=kpi.find(x=>x.name===names);out.push(k?Number(k[field])||0:0);});return out;};
  const actual=(name,isGrossExist)=>{const out=[];months.forEach(ym=>{const A=salesDealActual(cur.staff,ym);let v=A[name]||0;if(isGrossExist)v+=recurringMonthlyTotal(cur.staff,ym);out.push(v);});return out;};
  const data={
    粗利:{nT:pick("target","粗利（新規）"),nA:actual("粗利（新規）"),eT:pick("target","粗利（既存）"),eA:actual("粗利（既存）",true),cum:true,unit:"千円"},
    案件化:{nT:pick("target","案件化（新規）"),nA:actual("案件化（新規）"),eT:pick("target","案件化（既存）"),eA:actual("案件化（既存）"),cum:false,unit:"件"},
    アポ:{nT:pick("target","アポ（新規）"),nA:actual("アポ（新規）"),eT:pick("target","アポ（既存）"),eA:actual("アポ（既存）"),cum:false,unit:"件"},
  };

  const header=`<tr><th class="l">　</th>${moLabels.map(l=>`<th>${l}</th>`).join("")}<th>合計</th></tr>`;
  const valRow=(label,vals)=>`<tr><td class="l">${label}</td>${vals.map(v=>`<td>${v?fmt(v):"–"}</td>`).join("")}<td style="font-weight:700;">${fmt(sumA(vals))}</td></tr>`;
  // 達成=緑・未達=グレー
  const badge=r=>`<span class="ratebadge" style="background:${r>=100?'var(--ok)':'#b0b6bf'};">${r}%</span>`;
  // 単月の達成率行（目標0の月は–）
  const rateRow=(label,T,A)=>`<tr><td class="l">${label}</td>${T.map((t,i)=>`<td>${t>0?badge(rateOf(A[i],t)):"–"}</td>`).join("")}<td>${sumA(T)>0?badge(rateOf(sumA(A),sumA(T))):"–"}</td></tr>`;
  // 合計版（新規・既存をまとめる）：目標・実績・単月達成率
  const totalBlock=(title,d)=>{
    const totT=d.nT.map((v,i)=>v+d.eT[i]), totA=d.nA.map((v,i)=>v+d.eA[i]);
    return `<div style="font-weight:700;color:var(--navy);margin:14px 0 6px;">${title}（${d.unit}）</div>
      <div class="scroll-x"><table class="sum-table" style="min-width:960px;">
        ${header}
        ${valRow("目標",totT)}${valRow("実績",totA)}
        ${rateRow("達成率（単月）",totT,totA)}
      </table></div>`;
  };
  // 分割版（新規・既存）：それぞれ目標・実績・単月達成率
  const splitBlock=(title,d)=>{
    return `<div style="font-weight:700;color:var(--navy);margin:14px 0 6px;">${title}（${d.unit}）</div>
      <div class="scroll-x"><table class="sum-table" style="min-width:960px;">
        ${header}
        ${valRow("新規 目標",d.nT)}${valRow("新規 実績",d.nA)}${rateRow("新規 達成率（単月）",d.nT,d.nA)}
        ${valRow("既存 目標",d.eT)}${valRow("既存 実績",d.eA)}${rateRow("既存 達成率（単月）",d.eT,d.eA)}
      </table></div>`;
  };

  // ── 一番上：全体数字＋見込み着地（粗利・通期、継続込み） ──
  const grossTotT = data.粗利.nT.map((v,i)=>v+data.粗利.eT[i]);   // 通期 粗利目標（新規＋既存）
  const grossTotA = data.粗利.nA.map((v,i)=>v+data.粗利.eA[i]);   // 通期 粗利実績（継続込み）

  const bPipeW = Math.round(bPipe*0.8);

  // 上半期(10-3月)・下半期(4-9月)の実績達成率
  const h1T=sumA(grossTotT.slice(0,6)), h1A=sumA(grossTotA.slice(0,6)), h1R=rateOf(h1A,h1T);
  const h2T=sumA(grossTotT.slice(6)),   h2A=sumA(grossTotA.slice(6)),   h2R=rateOf(h2A,h2T);
  // 期中のペース判定（経過月数に対して順調か）。色（赤黄緑）は最終評価＝絶対達成率のまま
  const fyProg=monthsElapsed(months, cur.month);
  const h1Prog=monthsElapsed(halfMonths(fy,"H1"), cur.month);
  const h2Prog=monthsElapsed(halfMonths(fy,"H2"), cur.month);
  const scale = Math.max(annTarget, annLanding, 1), bw=v=>v/scale*100;
  const seg=(amt,col,lab)=>amt>0?`<div style="width:${bw(amt)}%;background:${col};" title="${lab} ${fmt(amt)}千円"></div>`:"";
  const tpos=Math.min(100, annTarget/scale*100);

      <div class="hint">/ 目標 ${fmt(t)}</div>
    </div>`;
  const summaryTop=`
    <div style="border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:6px;background:#fafbfc;">
      <div style="display:flex;gap:28px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-start;">
        <div>
          <div class="hint">通期目標（粗利・新規＋既存）</div>
          <div style="font-size:24px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;">${fmt(annTarget)}<small style="font-size:12px;color:var(--muted);"> 千円</small></div>
        </div>
        <div>
          <div class="hint">実績（累計・継続込み）</div>
          <div style="font-size:24px;font-weight:800;color:${colActual};font-variant-numeric:tabular-nums;">${fmt(annActual)} <span class="ratebadge" style="background:${colActual};font-size:12px;vertical-align:middle;">${rateActual}%</span>${paceBadge(annActual,annTarget,fyProg)}</div>
          <div class="hint" style="color:${gapActual<0?'var(--bad)':'var(--ok)'};">GAP ${gapActual>0?"+":""}${fmt(gapActual)}</div>
        </div>
        <div>
          <div class="hint">見込み着地（実績＋A＋B×80%）</div>
          <div style="font-size:24px;font-weight:800;color:${colLanding};font-variant-numeric:tabular-nums;">${fmt(annLanding)} <span class="ratebadge" style="background:${colLanding};font-size:12px;vertical-align:middle;">着地 ${rateLanding}%</span></div>
          <div class="hint" style="color:${gapLanding<0?'var(--bad)':'var(--ok)'};">着地GAP ${gapLanding>0?"+":""}${fmt(gapLanding)}</div>
        </div>
        <div style="display:flex;gap:24px;flex-wrap:wrap;margin-left:20px;padding-left:24px;border-left:1px solid var(--line);">
          ${halfBlock("上半期（10-3月）",h1A,h1T,h1R,h1Prog)}
          ${halfBlock("下半期（4-9月）",h2A,h2T,h2R,h2Prog)}
        </div>
        <div style="margin-left:20px;padding-left:24px;border-left:1px solid var(--line);">
          <div class="hint" style="font-weight:700;color:var(--cyan);">パス実績（通年・貢献）</div>
          <div style="font-size:24px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;">${fmt(passY.gross)} <small style="font-size:12px;color:var(--muted);">千円</small></div>
          <div class="hint">${passY.count}件 ※合算外</div>

      <div style="position:relative;height:26px;background:#eef1f5;border-radius:8px;overflow:hidden;display:flex;margin-bottom:6px;">
        ${seg(annWon,YOMI_COLOR.won,"受注")}${seg(annRec,YOMI_COLOR.rec,"継続")}${seg(aPipe,YOMI_COLOR.A,"A見込み")}${seg(bPipeW,YOMI_COLOR.B,"B見込み×80%")}
        <div style="position:absolute;left:${tpos}%;top:0;bottom:0;border-left:2px dashed var(--navy);" title="通期目標 ${fmt(annTarget)}"></div>

        <span style="color:var(--muted);">｜破線＝通期目標 ${fmt(annTarget)}</span>
      </div>
    </div>`;

  const groupTitle=t=>`<div style="font-weight:800;color:var(--navy);font-size:14px;margin:18px 0 2px;border-top:2px solid var(--line);padding-top:14px;">${t}</div>`;
  const wrap=document.createElement("div");

    <div style="font-weight:800;color:var(--cyan);font-size:14px;margin:18px 0 4px;border-top:2px solid var(--line);padding-top:14px;">パス実績（貢献度・あなた発の紹介で受注／自分の数字には合算しません）</div>
    <div class="scroll-x"><table class="sum-table" style="min-width:960px;">
      ${header}
      <tr><td class="l">受注粗利(千円)</td>${passArr.map(v=>`<td>${v?fmt(v):"–"}</td>`).join("")}<td style="font-weight:700;color:var(--cyan);">${fmt(sumA(passArr))}</td></tr>
      <tr><td class="l">件数</td>${passCntArr.map(v=>`<td>${v||"–"}</td>`).join("")}<td style="font-weight:700;">${sumA(passCntArr)}</td></tr>
    </table></div>`;
  wrap.innerHTML =
    summaryTop
    + groupTitle("全体（新規・既存をまとめた数字）")
    + totalBlock("粗利管理（実績は継続込み）", data.粗利)
    + totalBlock("案件化", data.案件化)
    + totalBlock("アポ", data.アポ)
    + passTable
    + groupTitle("新規・既存の内訳")
    + splitBlock("粗利管理（実績は継続込み）", data.粗利)
    + splitBlock("案件化", data.案件化)
    + splitBlock("アポ", data.アポ)
    + `<div class="hint" style="margin-top:10px;">達成率はすべて単月（その月の実績÷目標）。達成（100%以上）＝緑、未達＝グレー。粗利の実績は継続込み。バー色はダッシュボードと共通（受注＝赤・継続＝紫・A＝緑・B＝青）。</div>`;
  c.appendChild(wrap);
  return c;
}

// 新規分析タブ：着地予想・受注率（提案→契約）・ルート別実績（新規案件ベース）
function newAnalysisCard(){
  const fy=fyOfMonth(cur.month);
  const c=card(`新規分析（${fy}年10月〜${fy+1}年9月期・新規案件ベース）`,"新規分析");
  const months=fyMonths(fy);
  const deals=db.pipeline.filter(p=>p.staffId===cur.staff && dealKind(p)==="案件" && p.attribute==="新規");
  const isWon=p=>p.yomi==="受注"||p.yomi==="成功";

  // 着地予想（新規粗利・通期）＝受注確定＋A(100%)＋B(80%)
  let confirmed=0; months.forEach(ym=>{ confirmed+=salesDealActual(cur.staff,ym)["粗利（新規）"]||0; });
  let aSum=0,bSum=0;
  deals.forEach(p=>{ if(p.yomi==="A") aSum+=dealGross(p); else if(p.yomi==="B") bSum+=dealGross(p); });

  const landing=confirmed+aSum+bWt;
  let target=0; months.forEach(ym=>{ const mm=readSalesMonth(cur.staff,ym),kpi=mm&&mm.kpi?mm.kpi:[]; const k=kpi.find(x=>x.name==="粗利（新規）"); target+=k?Number(k.target)||0:0; });
  const rate=rateOf(landing,target);
  const achieved=target>0 && landing>=target;
  const tcol=rateColor(rate);                 // 文字は今の色（達成度カラー）
  const scale=Math.max(target,landing,1), w=v=>v/scale*100;

  // ルート別（今月／通年で共通利用するビルダー）

    const routes=[...new Set(subset.map(p=>p.route||"未設定"))];
    const body=routes.map(rt=>{
      const ds=subset.filter(p=>(p.route||"未設定")===rt);
      const prop=ds.length, won=ds.filter(isWon).length;

/* ---------- チャネル別の計画（案件化・アポ） ---------- */
function channelCard(m){
  const c = card("チャネル別の計画（案件化・アポ）","CHANNEL");
  if(!m.channels) m.channels = {};
  const isAdmin = cur.role==="admin";
  const body=document.createElement("div"); body.className="scroll-x";
  body.innerHTML=`<table class="sum-table" style="min-width:720px;">
    <thead><tr>
      <th class="l">チャネル</th>
      <th>案件化 目標</th><th>案件化 実績</th><th>達成</th>
      <th>アポ 目標</th><th>アポ 実績</th><th>達成</th>
      ${isAdmin?"<th></th>":""}</tr></thead>
    <tbody id="chBody"></tbody>
  </table>`;
  c.appendChild(body);
  const foot=document.createElement("div");
  if(isAdmin){
    foot.style.marginTop="10px";
    foot.innerHTML=`<button class="btn-mini" id="addCh">＋ チャネルを追加</button>
      <span class="hint" style="margin-left:8px;">チャネルの追加・削除は管理者のみ。スタッフは数値入力のみ。</span>`;
  } else {
    foot.innerHTML=`<div class="hint" style="margin-top:10px;">チャネルの追加・削除は管理者が行います。</div>`;
  }
  c.appendChild(foot);

  const tb=$("#chBody",body);
  const colspan=isAdmin?8:7;
  const cellInput=(ch,key)=>`<input type="number" data-ch="${esc(ch)}" data-k="${key}" value="${m.channels[ch]&&m.channels[ch][key]!=null?m.channels[ch][key]:""}" placeholder="0" style="width:90px;text-align:right;">`;
  const totalRow=()=>{
    const tot={caseT:0,caseA:0,apoT:0,apoA:0};
    db.channels.forEach(ch=>{ const d=m.channels[ch]||{}; tot.caseT+=Number(d.caseT)||0; tot.caseA+=Number(d.caseA)||0; tot.apoT+=Number(d.apoT)||0; tot.apoA+=Number(d.apoA)||0; });
    return `<td class="l">合計</td>
      <td>${fmt(tot.caseT)}</td><td>${fmt(tot.caseA)}</td><td>${tot.caseT>0?ratebadge(rateOf(tot.caseA,tot.caseT)):"–"}</td>
      <td>${fmt(tot.apoT)}</td><td>${fmt(tot.apoA)}</td><td>${tot.apoT>0?ratebadge(rateOf(tot.apoA,tot.apoT)):"–"}</td>
      ${isAdmin?"<td></td>":""}`;
  };
  const draw=()=>{
    tb.innerHTML="";
    db.channels.forEach(ch=>{
      const d=m.channels[ch]||{};
      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td class="l nm">${esc(ch)}</td>
        <td>${cellInput(ch,"caseT")}</td><td>${cellInput(ch,"caseA")}</td>
        <td class="cr">${(Number(d.caseT)||0)>0?ratebadge(rateOf(Number(d.caseA)||0,Number(d.caseT)||0)):"–"}</td>
        <td>${cellInput(ch,"apoT")}</td><td>${cellInput(ch,"apoA")}</td>
        <td class="ar">${(Number(d.apoT)||0)>0?ratebadge(rateOf(Number(d.apoA)||0,Number(d.apoT)||0)):"–"}</td>
        ${isAdmin?`<td class="num"><button class="btn-mini btn-danger" data-del="${esc(ch)}" style="border:1px solid var(--bad)">削除</button></td>`:""}`;
      tb.appendChild(tr);
    });
    const trt=document.createElement("tr"); trt.className="total"; trt.id="chTotalRow"; trt.innerHTML=totalRow();
    tb.appendChild(trt);
    tb.querySelectorAll("input").forEach(inp=>{
      inp.oninput=e=>{
        const ch=inp.dataset.ch, key=inp.dataset.k;
        if(!m.channels[ch]) m.channels[ch]={};
        m.channels[ch][key]= e.target.value===""?"":Number(e.target.value);
        save();
        const d=m.channels[ch], row=inp.closest("tr");
        row.querySelector(".cr").innerHTML=(Number(d.caseT)||0)>0?ratebadge(rateOf(Number(d.caseA)||0,Number(d.caseT)||0)):"–";
        row.querySelector(".ar").innerHTML=(Number(d.apoT)||0)>0?ratebadge(rateOf(Number(d.apoA)||0,Number(d.apoT)||0)):"–";
        $("#chTotalRow").innerHTML=totalRow();
      };
    });
    if(isAdmin) tb.querySelectorAll("button[data-del]").forEach(b=>{
      b.onclick=()=>{ if(confirm(`チャネル「${b.dataset.del}」を削除しますか？（全スタッフ共通）`)){ db.channels=db.channels.filter(x=>x!==b.dataset.del); save(); draw(); } };
    });
  };
  draw();
  if(isAdmin) $("#addCh",foot).onclick=()=>{
    const name=prompt("追加するチャネル名"); if(!name) return;
    if(db.channels.includes(name.trim())){ alert("同名のチャネルが既にあります"); return; }
    db.channels.push(name.trim()); save(); draw();
  };
  return c;
}

/* ---------- 案件パイプライン（ヨミ管理） ---------- */
const YOMI = ["A","B","C","D"];
const YOMI_COEF = {A:0.9, B:0.6, C:0.3, D:0.1};   // 確度の目安（加重見込み用）
// 案件のステージ（ライフサイクル）：アポイント→案件化(見積提出)→受注／失注・没
const PIPE_STATUS = ["アポイント","案件化","受注","失注","没"];
const PIPE_KINDS = ["見込み","既存","EXPO"];        // 案件管理の区分（営業シートに対応）
// 集計に使う粗利：個人粗利優先（本人の取り分）→ 粗利合計 → 旧grossの順
function dealGross(p){
  if(p.personalGross!=="" && p.personalGross!=null) return Number(p.personalGross)||0;
  if(p.grossTotal!=="" && p.grossTotal!=null) return Number(p.grossTotal)||0;
  return Number(p.gross)||0;
}
function dealContent(p){ return p.content!=null ? p.content : (p.name||""); }
function dealKind(p){ return p.dealType || (p.yomi ? "案件" : "アポ"); }   // アポ / 案件
// 月の経過割合（過去月=1・未来月=0・今月=今日/月末日）
function monthProgress(ym){
  const now=new Date(); const today=now.getFullYear()*12+(now.getMonth()+1);
  const [y,mo]=ym.split("-").map(Number); const cm=y*12+mo;
  if(cm<today) return 1; if(cm>today) return 0;
  const last=new Date(y,mo,0).getDate();
  return Math.min(1, now.getDate()/last);
}
// 着地見込み用のヨミ確度（A=100%/B=80%/C=33%/D=0%）
const YOMI_LAND = {A:1.0, B:0.8, C:0.33, D:0};
// ヨミ別の案件額（個人粗利合計）と着地寄与
function pipelineByYomi(staffId){
  const by={A:0,B:0,C:0,D:0};
  db.pipeline.filter(p=>p.staffId===staffId && dealKind(p)==="案件").forEach(p=>{ if(by[p.yomi]!==undefined) by[p.yomi]+=dealGross(p); });
  const contrib={}; let weighted=0;
  ["A","B","C","D"].forEach(y=>{ contrib[y]=Math.round(by[y]*YOMI_LAND[y]); weighted+=contrib[y]; });
  return {by, contrib, weighted};
}
function pipelineWeighted(staffId){ return pipelineByYomi(staffId).weighted; }
// 期末の着地（通期目標／累計確定＋見込み）
function fyLanding(staffId, fy){
  let target=0, confirmed=0;
  fyMonths(fy).forEach(ym=>{
    const mm=readSalesMonth(staffId,ym), kpi=mm&&mm.kpi?mm.kpi:[];
    target+=kpiSum(kpi, GROSS_NAMES, "target");
    const Am=salesDealActual(staffId,ym);
    confirmed+=(Am["粗利（新規）"]||0)+(Am["粗利（既存）"]||0)+recurringMonthlyTotal(staffId,ym);
  });
  const weighted=pipelineWeighted(staffId);
  return {target, confirmed, weighted, landing:confirmed+weighted};
}
// 今月の着地見込み（月次ダッシュボードのメイン）
function monthLanding(staffId, ym, m){
  const A = salesDealActual(staffId, ym);
  const won = (A["粗利（新規）"]||0)+(A["粗利（既存）"]||0);   // 受注確定
  const rec = recurringMonthlyTotal(staffId, ym);             // 継続
  const confirmed = won+rec;
  const P = pipelineByYomi(staffId);
  const target = kpiSum(m.kpi, GROSS_NAMES, "target");
  return {target, won, rec, confirmed, by:P.by, contrib:P.contrib, weighted:P.weighted, landing:confirmed+P.weighted};
}

    ${sec("ヨミ別の見込み（個人粗利）")}

// その日のKPI（契約＝受注・案件化＝提案・アポ＝活動履歴）を案件から自動集計
function dailyKPI(staffId, date){
  let keiyakuCnt=0, keiyakuGross=0, caseCnt=0, apoCnt=0;
  db.pipeline.filter(p=>p.staffId===staffId).forEach(p=>{
    if((""+(p.orderDate||""))===date){ keiyakuCnt++; keiyakuGross+=dealGross(p); }
    if((""+(p.proposalDate||""))===date){ caseCnt++; }
    (p.activities||[]).forEach(a=>{ if((""+(a.date||""))===date) apoCnt++; });
  });
  return {keiyakuCnt, keiyakuGross, caseCnt, apoCnt};
}
function reportKey(){ return cur.staff+"|"+cur.reportDate; }
function getReport(){ return db.reports[reportKey()] || (db.reports[reportKey()]={notice:"",plan:"",fb:"",fbElements:""}); }
// Anthropic APIキー（各自設定・localStorageに保存）
function aiKey(){ return localStorage.getItem("anthropic_key")||""; }
async function aiFeedback(notice, elements, currentFb){
  const key=aiKey();
  if(!key) throw new Error("nokey");
  const sys="あなたは営業チームの上司です。部下の日報を読み、現場目線で簡潔（3〜4文）に、具体的なねぎらいと次の一手のアドバイスを日本語で返します。整いすぎた定型文や説教くさい表現は避け、自然な口調で。";
  const user = elements && elements.trim()
    ? `部下の今日の気づき・報告：\n${notice||"（記載なし）"}\n\n下書きフィードバック：\n${currentFb||"（なし）"}\n\n上司として盛り込みたい要素：\n${elements}\n\n上記の要素を自然に反映してフィードバックをリライトしてください。本文のみ出力。`
    : `部下の今日の気づき・報告：\n${notice||"（記載なし）"}\n\nこれに対する上司からのフィードバック案を作成してください。本文のみ出力。`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true","content-type":"application/json"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,system:sys,messages:[{role:"user",content:user}]})
  });
  if(!res.ok){ const t=await res.text(); throw new Error("api "+res.status+" "+t.slice(0,120)); }
  const j=await res.json();
  return (j.content||[]).map(b=>b.text||"").join("").trim();
}
function reportFor(staffId,date){ const k=staffId+"|"+date; return db.reports[k]||(db.reports[k]={notice:"",plan:"",fb:"",fbElements:""}); }
// その月で日報・KPIのある日付（新しい順）
function reportDatesOfMonth(staffId,ym){
  const set=new Set();
  Object.keys(db.reports).forEach(k=>{ const i=k.indexOf("|"); if(i<0) return; const sid=k.slice(0,i), date=k.slice(i+1);
    if(sid===staffId && date.startsWith(ym)){ const r=db.reports[k]; if((r.notice||"").trim()||(r.plan||"").trim()||(r.fb||"").trim()) set.add(date); } });
  db.pipeline.filter(p=>p.staffId===staffId).forEach(p=>{
    [p.orderDate,p.proposalDate].forEach(d=>{ if(d&&(""+d).startsWith(ym)) set.add(""+d); });
    (p.activities||[]).forEach(a=>{ if(a.date&&(""+a.date).startsWith(ym)) set.add(""+a.date); });
  });
  return [...set].sort().reverse();
}

    + `<div class="kpi" style="border-color:var(--cyan);"><div class="name">案件化までの平均アポ数</div><div class="val">${avgApo.toFixed(1)} <small>回/件</small></div></div>`
    + YOMI.map(y=>`<div class="kpi"><div class="name">ヨミ${y}（${by[y].n}件）</div>
      <div class="val">${fmt(by[y].g)} <small>千円</small></div></div>`).join("")
    + `<div class="kpi" style="border-color:var(--cyan);">
        <div class="name">案件化の見込み / 加重</div>
        <div class="val">${fmt(total)} <small>千円</small></div>
        <div class="hint" style="margin-top:4px;">加重 ${fmt(weighted)} 千円</div></div>`;
  c.appendChild(wrap);
  return c;
}
// 案件のステータス：アポ（自動判定）／提案済（提案前は廃止し案件はすべて提案済扱い）
function dealStatus(p){
  if(dealKind(p)==="アポ") return "アポ";
  return "提案済";
}
function attrChip(a){
  if(a==="新規") return `<span class="status-chip" style="background:#e3f0ff;color:#1f5fb0;border-color:#bcd8fb;">新規</span>`;
  if(a==="既存") return `<span class="status-chip" style="background:#fdebd8;color:#bd6f24;border-color:#f3d2ad;">既存</span>`;
  return '<span class="hint">–</span>';
}
function statusChip(p){
  const s=dealStatus(p);
  const cls={"アポ":"","提案済":"win"}[s]||"";
  return `<span class="status-chip ${cls}">${s}</span>`;
}
function pipelineCard(){
  const c = card("案件管理","PIPELINE");
  // 「アポ記録／案件を追加」ボタンは表の上部へ
  const add = document.createElement("div");
  add.style.marginBottom="10px";
  add.innerHTML=`<button class="btn-primary btn-mini" id="addApo">＋ アポ記録</button>
    <button class="btn-mini" id="addPipe" style="margin-left:8px;">＋ 案件を追加（詳細）</button>
    <span class="hint" style="margin-left:8px;">行クリックで編集。見出しクリックで並び替え。活動履歴はマウスを乗せると内容表示。</span>`;
  c.appendChild(add);
  // ヨミで絞り込み（受注・没などを隠せる）。デフォルトで受注・成功・ボツ・パスを非表示
  const YOMI_FILTER_KEYS=["A","B","C","D","アポ","未設定","受注","成功","ボツ","パス"];
  if(!cur.pipeYomiHidden) cur.pipeYomiHidden=["受注","成功","ボツ","パス"];
  const yomiKey=p=> dealKind(p)==="アポ" ? "アポ" : (p.yomi||"未設定");
  const filterBar=document.createElement("div");
  filterBar.style.cssText="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;";
  c.appendChild(filterBar);
  const body = document.createElement("div"); body.className="scroll-x";
  c.appendChild(body);

  const cols=[
    {k:"client",   l:"クライアント"},
    {k:"owner",    l:"担当"},
    {k:"content",  l:"内容"},
    {k:"attribute",l:"属性"},
    {k:"apo",      l:"アポ", num:true},
    {k:"gross",    l:"粗利", num:true},
    {k:"yomi",     l:"ヨミ"},
    {k:"status",   l:"ステータス"},
    {k:"orderDate",l:"受注日"},
    {k:"bant",     l:"BANT助"},
    {k:"nextActionDate", l:"次回アポ"},
    {k:"act",      l:"活動履歴"},
  ];
  if(!cur.pipeSort) cur.pipeSort={key:null,dir:1};
  const valOf=(p,k)=>{
    switch(k){
      case "apo": return Number(p.apoCount)||0;
      case "gross": return dealGross(p);
      case "yomi": return ({"受注":0,"成功":1,"A":2,"B":3,"C":4,"D":5,"ボツ":8,"パス":9}[p.yomi]??7);
      case "status": return ({"アポ":0,"提案済":2}[dealStatus(p)]||0);
      case "content": return dealContent(p)||"";
      case "bant": return bantText(p);
      case "act": return (p.activities||[]).length;
      default: return p[k]||"";
    }
  };
  const cellOf=(p,k)=>{
    switch(k){
      case "client": return `<td class="nm">${esc(p.client)||'<span class="hint">（未入力）</span>'}</td>`;
      case "owner": return `<td>${esc(p.owner||"")}</td>`;
      case "content": return `<td>${esc(dealContent(p))}</td>`;
      case "attribute": return `<td>${attrChip(p.attribute)}</td>`;
      case "apo": return `<td class="num">${Number(p.apoCount)||0}</td>`;
      case "gross": return `<td class="num">${fmt(dealGross(p))}</td>`;
      case "yomi": return `<td>${dealKind(p)==="案件"?`<span class="status-chip ${yomiClass(p.yomi)}">${esc(p.yomi||"–")}</span>`:'<span class="hint">–</span>'}</td>`;
      case "status": return `<td>${statusChip(p)}</td>`;
      case "orderDate": return `<td>${esc(p.orderDate||"")||'<span class="hint">–</span>'}</td>`;
      case "bant": return `<td>${esc(bantText(p))||'<span class="hint">–</span>'}</td>`;
      case "nextActionDate": return `<td>${esc(p.nextActionDate||"")||'<span class="hint">–</span>'}</td>`;
      case "act": {
        const acts=(p.activities||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||""));
        if(!acts.length) return `<td><span class="hint">–</span></td>`;
        const tip=acts.map(a=>`${a.date||""}　${a.memo||""}`).join("\n");
        return `<td title="${esc(tip)}" style="cursor:help;text-decoration:underline dotted;">${acts.length}件</td>`;
      }
      default: return `<td></td>`;
    }
  };
  const draw=()=>{
    const list=db.pipeline.filter(p=>p.staffId===cur.staff && !cur.pipeYomiHidden.includes(yomiKey(p))).slice();
    const {key,dir}=cur.pipeSort;
    if(key) list.sort((a,b)=>{ const x=valOf(a,key),y=valOf(b,key);
      return (typeof x==="number"&&typeof y==="number") ? (x-y)*dir : String(x).localeCompare(String(y),"ja")*dir; });
    const head=`<tr>${cols.map(col=>{
      const arrow=cur.pipeSort.key===col.k?(cur.pipeSort.dir>0?" ▲":" ▼"):"";
      return `<th data-k="${col.k}" style="cursor:pointer;${col.num?"text-align:right;":""}white-space:nowrap;">${col.l}${arrow}</th>`;
    }).join("")}<th></th></tr>`;
    const rows = list.length ? list.map(p=>
      `<tr data-id="${p.id}" style="cursor:pointer;">${cols.map(col=>cellOf(p,col.k)).join("")}<td class="num"><button class="btn-mini" data-edit="${p.id}">編集</button></td></tr>`
    ).join("") : `<tr><td colspan="${cols.length+1}" class="hint">${db.pipeline.some(p=>p.staffId===cur.staff)?"絞り込み条件に合う案件がありません（ヨミの絞り込みを確認）。":"案件がありません。「＋ アポ記録」または「＋ 案件を追加」から登録してください。"}</td></tr>`;
    body.innerHTML=`<table class="deal-table" style="min-width:1180px;white-space:nowrap;"><thead>${head}</thead><tbody>${rows}</tbody></table>`;
    body.querySelectorAll("th[data-k]").forEach(th=>th.onclick=()=>{
      const k=th.dataset.k;
      if(cur.pipeSort.key===k) cur.pipeSort.dir*=-1; else { cur.pipeSort.key=k; cur.pipeSort.dir=1; }
      draw();
    });
    body.querySelectorAll("tr[data-id]").forEach(tr=>{
      const p=db.pipeline.find(x=>x.id===tr.dataset.id);
      tr.onclick=()=>openDealModal(p);
    });
    body.querySelectorAll("button[data-edit]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); openDealModal(db.pipeline.find(x=>x.id===b.dataset.edit)); });
  };
  const drawFilter=()=>{
    const counts={}; db.pipeline.filter(p=>p.staffId===cur.staff).forEach(p=>{ const k=yomiKey(p); counts[k]=(counts[k]||0)+1; });
    filterBar.innerHTML=`<span class="hint" style="margin-right:2px;">ヨミで絞り込み：</span>`
      + YOMI_FILTER_KEYS.map(k=>{
          const on=!cur.pipeYomiHidden.includes(k);
          return `<button class="btn-mini" data-y="${esc(k)}" style="border:1px solid var(--line);${on?"":"opacity:.4;"}">${esc(k)}${counts[k]?`<span class="hint" style="margin-left:3px;">${counts[k]}</span>`:""}</button>`;
        }).join("")
      + `<button class="btn-mini" data-y="__all" style="margin-left:6px;">全表示</button>`;
    filterBar.querySelectorAll("button[data-y]").forEach(b=>b.onclick=()=>{
      const k=b.dataset.y;
      if(k==="__all") cur.pipeYomiHidden=[];
      else if(cur.pipeYomiHidden.includes(k)) cur.pipeYomiHidden=cur.pipeYomiHidden.filter(x=>x!==k);
      else cur.pipeYomiHidden=cur.pipeYomiHidden.concat(k);
      drawFilter(); draw();
    });
  };
  drawFilter();
  draw();
  $("#addPipe",add).onclick=()=>openDealModal(null);
  $("#addApo",add).onclick=()=>openApoModal();
  return c;
}

      personalSales:num("fPersSales"), personalGross:num("fPersGross"),
      yomi:val("fYomi"),
      bantB:ck("fB"), bantA:ck("fA"), bantN:ck("fN"), bantT:ck("fT"), subsidy:ck("fJo"),
      proposalDate:val("fProp"), orderDate:val("fOrder"), deliveryDate:val("fDeliv"),

    save(); root.innerHTML=""; render();
  };
  if(!isNew) $("#dDelete").onclick=()=>{ const idx=db.pipeline.indexOf(p); if(idx>=0)db.pipeline.splice(idx,1); save(); root.innerHTML=""; render(); };
}

function recurringActive(r, ym){
  const s=r.startMonth||"", e=r.endMonth||"";
  if(s && ym < s) return false;
  if(e && ym > e) return false;
  return true;
}
// 個人の月額＝月額−サブ1−サブ2（分配後の自分の取り分）
function recIndividual(r){ return Math.max(0,(Number(r.monthly)||0)-(Number(r.sub1)||0)-(Number(r.sub2)||0)); }
function recurringMonthlyTotal(staffId, ym){
  return db.recurring.filter(r=>r.staffId===staffId && recurringActive(r,ym))
                     .reduce((s,r)=>s+recIndividual(r),0);
}

/* ---------- CSV取込 ---------- */
const CSV_GUESS = {
  staff:["担当者","担当","営業担当","営業","スタッフ","社員","氏名","名前"],
  name:["案件名","案件","物件名","物件","件名","タイトル","顧客名","会社名","顧客","会社"],
  amount:["金額","受注金額","納品金額","売上","売上金額","価格","契約金額"],
  date:["受注日","納品日","成約日","契約日","登録日","日付","計上日","日"],
  status:["ステータス","状態","区分","進捗","フェーズ","種別"]
};
function parseCSV(text){
  const rows=[]; let i=0, field="", row=[], inQ=false;
  while(i<text.length){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} inQ=false;i++;continue; }
      field+=ch;i++;continue;
    }
    if(ch==='"'){inQ=true;i++;continue;}
    if(ch===','){row.push(field);field="";i++;continue;}
    if(ch==='\r'){i++;continue;}
    if(ch==='\n'){row.push(field);rows.push(row);row=[];field="";i++;continue;}
    field+=ch;i++;
  }
  if(field!==""||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(c=>(c||"").trim()!==""));
}
function decodeBuf(buf){
  let t=new TextDecoder("utf-8",{fatal:false}).decode(buf);
  if(t.indexOf("�")>=0){ try{ t=new TextDecoder("shift_jis").decode(buf); }catch(e){} }
  return t;
}
function guessCol(headers,keys){
  for(let h=0;h<headers.length;h++){ if(keys.some(k=>(headers[h]||"").includes(k))) return h; }
  return -1;
}
function normDate(s){
  s=(s||"").trim();
  let m=s.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(m) return `${m[1]}-${pad(+m[2])}-${pad(+m[3])}`;
  m=s.match(/(\d{4})\D+(\d{1,2})/);
  if(m) return `${m[1]}-${pad(+m[2])}`;
  return s;
}
function parseAmount(s){ const n=Number((s||"").replace(/[^0-9.\-]/g,"")); return isNaN(n)?0:n; }
function matchStaff(nameCell){
  const v=(nameCell||"").trim();
  if(!v) return null;
  let s=db.staff.find(x=>x.name===v);
  if(s) return s.id;
  s=db.staff.find(x=>v.includes(x.name) || x.name.includes(v));
  return s?s.id:null;
}

let csvState=null;
function onCsvPicked(e){
  const f=e.target.files[0]; e.target.value=""; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const rows=parseCSV(decodeBuf(r.result));
    if(rows.length<2){ alert("データが読み取れませんでした。CSVの中身をご確認ください。"); return; }
    const headers=rows[0], data=rows.slice(1);
    csvState={headers,data,map:{
      staff:guessCol(headers,CSV_GUESS.staff),
      name:guessCol(headers,CSV_GUESS.name),
      amount:guessCol(headers,CSV_GUESS.amount),
      date:guessCol(headers,CSV_GUESS.date),
      status:guessCol(headers,CSV_GUESS.status)
    },unit:"yen",replace:true};
    openCsvModal();
  };
  r.readAsArrayBuffer(f);
}
function colOptions(sel){
  return csvState.headers.map((h,i)=>`<option value="${i}" ${i===sel?"selected":""}>${esc(h||("列"+(i+1)))}</option>`).join("");
}
function openCsvModal(){
  const root=$("#modalRoot");
  root.innerHTML=`
  <div class="modal-bg"><div class="modal">
    <h3>CSV取込（CRMの案件データ）</h3>
    <div class="hint">列の対応づけを確認してください。担当者名でスタッフに自動で振り分けます。数値はすべて千円で保存します。</div>
    <div class="map-grid">
      <div class="field"><label>担当者の列</label><select id="mStaff">${colOptions(csvState.map.staff)}</select></div>
      <div class="field"><label>案件名の列</label><select id="mName">${colOptions(csvState.map.name)}</select></div>
      <div class="field"><label>金額の列</label><select id="mAmount">${colOptions(csvState.map.amount)}</select></div>
      <div class="field"><label>日付の列</label><select id="mDate">${colOptions(csvState.map.date)}</select></div>
      <div class="field"><label>ステータスの列</label><select id="mStatus">${colOptions(csvState.map.status)}</select></div>
      <div class="field"><label>金額の単位</label><select id="mUnit"><option value="yen">円（÷1000で千円化）</option><option value="sen">千円（そのまま）</option></select></div>
    </div>
    <label style="font-size:12px;display:flex;gap:6px;align-items:center;"><input type="checkbox" id="mReplace" checked> 取込前に既存の案件をすべて置き換える</label>
    <div id="csvPreview"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="csvCancel">キャンセル</button>
      <button class="btn-primary" id="csvCommit">この内容で取り込む</button>
    </div>
  </div></div>`;
  const refresh=()=>{
    csvState.map.staff=+$("#mStaff").value; csvState.map.name=+$("#mName").value;
    csvState.map.amount=+$("#mAmount").value; csvState.map.date=+$("#mDate").value;
    csvState.map.status=+$("#mStatus").value; csvState.unit=$("#mUnit").value;
    renderCsvPreview();
  };
  ["mStaff","mName","mAmount","mDate","mStatus","mUnit"].forEach(id=>$("#"+id).onchange=refresh);
  $("#csvCancel").onclick=()=>{ root.innerHTML=""; csvState=null; };
  $("#csvCommit").onclick=commitCsv;
  renderCsvPreview();
}
function buildDeals(){
  const {data,map,unit}=csvState;
  const out=[]; let unmatched=0;
  data.forEach(r=>{
    const sid=matchStaff(r[map.staff]);
    let amt=parseAmount(r[map.amount]); if(unit==="yen") amt=Math.round(amt/1000);
    const deal={ id:uid(), staffId:sid, staffName:(r[map.staff]||"").trim(),
      name:(r[map.name]||"").trim(), amount:amt, date:normDate(r[map.date]),
      status:(r[map.status]||"").trim() };
    if(!sid) unmatched++;
    out.push(deal);
  });
  return {out, unmatched};
}
function renderCsvPreview(){
  const {out,unmatched}=buildDeals();
  const matched=out.filter(d=>d.staffId);
  const sample=out.slice(0,6);
  $("#csvPreview").innerHTML=`
    <div style="margin:10px 0 4px;font-size:12px;">
      取込対象 ${out.length} 件中、スタッフに紐づく <b>${matched.length}</b> 件
      ${unmatched?`<span class="warn-line">／ 担当者が一致しない ${unmatched} 件（スキップ）</span>`:""}
    </div>
    <div class="scroll-x"><table class="prev-table">
      <thead><tr><th>担当者</th><th>→スタッフ</th><th>案件名</th><th>日付</th><th>ステータス</th><th>金額(千円)</th></tr></thead>
      <tbody>${sample.map(d=>{
        const sname=d.staffId?(db.staff.find(s=>s.id===d.staffId)||{}).name:`<span class="warn-line">未一致</span>`;
        return `<tr><td>${esc(d.staffName)}</td><td>${sname}</td><td>${esc(d.name)}</td><td>${esc(d.date)}</td><td>${esc(d.status)}</td><td style="text-align:right">${fmt(d.amount)}</td></tr>`;
      }).join("")}</tbody>
    </table></div>
    ${out.length>6?`<div class="hint">…ほか ${out.length-6} 件</div>`:""}`;
}
function commitCsv(){
  const replace=$("#mReplace").checked;
  const {out}=buildDeals();
  const keep=out.filter(d=>d.staffId);
  if(replace) db.deals=keep; else db.deals=db.deals.concat(keep);
  save();
  $("#modalRoot").innerHTML=""; csvState=null;
  render();
  alert(`案件を ${keep.length} 件取り込みました。`);
}

/* ---------- helper ---------- */
function card(title,tag){
  const c=document.createElement("section"); c.className="card";
  c.innerHTML=`<h2><span class="tag">${tag}</span>${title}</h2>`;
  return c;
}
function rateColor(r){ if(r>=100)return"var(--ok)"; if(r>=70)return"var(--warn)"; return"var(--bad)"; }
// 期中向け：経過割合に対して順調か（順調/遅れ気味）。最終評価の絶対達成率とは役割が別
function paceBadge(actual, target, prog){
  if(target<=0 || prog<=0) return "";
  return actual >= target*prog
    ? '<span class="ratebadge" style="background:var(--ok);font-size:11px;margin-left:4px;">順調</span>'
    : '<span class="ratebadge" style="background:var(--warn);font-size:11px;margin-left:4px;">遅れ気味</span>';
}
// 月リストの経過割合（当月＝その月まで完了として (index+1)/件数。範囲外は0か1）
function monthsElapsed(monthsList, ym){
  const idx=monthsList.indexOf(ym);
  if(idx>=0) return (idx+1)/monthsList.length;
  return ym > monthsList[monthsList.length-1] ? 1 : 0;
}
// 週の経過割合（当月の今週は経過日数ベース、過去週は1、未来週は0）
function weekElapsed(ym, period){
  const now=new Date();
  const curYM=`${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  if(ym<curYM) return 1;
  if(ym>curYM) return 0;
  const d=now.getDate();
  if(d>period.end) return 1;
  if(d<period.start) return 0;
  return (d-period.start+1)/(period.end-period.start+1);
}
function fmt(n){ return (Number(n)||0).toLocaleString("ja-JP"); }
function esc(s){ return (s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="weekly-goal-backup.json"; a.click();
}
function importData(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d.staff){db=d;if(!db.deals)db.deals=[];if(!db.pipeline)db.pipeline=[];if(!db.recurring)db.recurring=[];if(!db.channels)db.channels=["既存","WEB","紹介","交流会","レディクル","代理店","展示会","アイミツ","その他"];if(!db.members)db.members=db.staff.map(s=>s.name);save();cur.staff=db.staff[0].id;render();alert("読み込みました");} }catch(err){alert("読み込めませんでした");} };
  r.readAsText(f);
}

init();
</script>
