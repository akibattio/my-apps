<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>広告運用コンソール（モック）</title>
<!-- 依存(React/ReactDOM/lucide/Babel)は console/vendor/ に自前ホスト。外部CDN(esm.sh/unpkg)に依存せず、CDN障害時も表示が壊れない。差し替えは scripts でバンドル再生成。 -->
<script type="importmap">
{
  "imports": {
    "react": "./vendor/react.js",
    "react-dom/client": "./vendor/react-dom-client.js",
    "lucide-react": "./vendor/lucide-react.js"
  }
}
</script>
<script src="./vendor/babel.min.js"></script>
<style>
  body { margin: 0; }
  #root { min-height: 100vh; }
  .boot { font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; padding: 40px; color: #64748b; }
  /* 月初レポート：印刷/PDF時はナビ・ボタン等を隠し、開いている社の詳細だけを出す */
  @media print {
    .no-print { display: none !important; }
    body { background: #fff !important; }
    @page { margin: 12mm; }
  }
</style>
</head>
<body>
<div id="root"><div class="boot">読み込み中…</div></div>
<script type="module">
  try {
    const src = await (await fetch('./ad_ops_console.jsx', { cache: 'no-store' })).text();
    const { code } = Babel.transform(src, { presets: ['react'], filename: 'app.jsx' });
    const url = URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
    const [mod, React, rd] = await Promise.all([
      import(url), import('react'), import('react-dom/client')
    ]);
    rd.createRoot(document.getElementById('root')).render(React.createElement(mod.default));
  } catch (e) {
    document.getElementById('root').innerHTML =
      '<div class="boot">読み込みエラー: ' + e.message + '</div>';
    console.error(e);
  }
</script>
</body>
</html>
