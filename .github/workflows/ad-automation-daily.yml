name: ad-automation daily

# 毎朝8:30 JST（=前日23:30 UTC）に実行。手動実行(workflow_dispatch)も可。
# 生成物 console/（index.html・ad_ops_console.jsx・data.json）を Cloudflare Pages へデプロイ。
# 秘密情報は GitHub Secrets（リポジトリには入れない・CLAUDE.md §8）。書き込み系は一切呼ばない（読み取りのみ）。

on:
  schedule:
    - cron: "30 23 * * *"  # 08:30 JST（朝の定期）
    - cron: "0 3 * * *"    # 12:00 JST（日中の再取得＝急変を早く検知）
    - cron: "0 7 * * *"    # 16:00 JST（夕方の再取得）
  workflow_dispatch: {}
  # ad-automation の変更を main に push したら自動で再取得＆デプロイ（コンソール改修を即反映）
  push:
    branches: [main]
    paths:
      - "ad-automation/**"
      - ".github/workflows/ad-automation-daily.yml"

permissions:
  contents: read

concurrency:
  group: ad-automation-daily
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ad-automation
    env:
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
      GOOGLE_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_LOGIN_CUSTOMER_ID }}
      SOFCOM_META_SYSTEM_USER_TOKEN: ${{ secrets.SOFCOM_META_SYSTEM_USER_TOKEN }}
      GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
      # 通知は「Webhookが登録済み かつ 朝8:30の実行(または手動)」のときだけ Google Chat へ。昼/夕は通知しない（ノイズ回避）。
      NOTIFY_CHANNEL: ${{ (secrets.GOOGLE_CHAT_WEBHOOK_URL != '' && (github.event_name != 'schedule' || github.event.schedule == '30 23 * * *')) && 'googlechat' || 'none' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存インストール
        run: pip install -r requirements.txt

      - name: 取得 → 日次時系列 → 検索診断 → 監視（読み取りのみ）
        run: |
          python3 scripts/build_console_data.py
          python3 scripts/fetch_daily_series.py
          python3 scripts/fetch_search_diagnostics.py
          # 月次時系列(最大14ヶ月・前年同月比/長期トレンド用)→ console/monthly.json
          python3 scripts/fetch_monthly_series.py || true
          # 監査（ads-google観点の機械チェック）→ console/audit.json（クライアント詳細で表示）
          python3 scripts/build_audits.py || true
          # 提案の下書き生成（監査・検索診断から）→ console/data.json の proposals（承認キュー）
          python3 scripts/build_proposals.py || true
          # 監視＋通知（NOTIFY_CHANNEL=none のときは送信スキップ＝Webhook未登録/朝以外は自動でnone）
          python3 scripts/monitor.py --send || true
          # 週次/月次ビュー用に日次時系列を配信ディレクトリへ複製
          cp data/daily.json console/daily.json 2>/dev/null || true

      - name: Cloudflare Pages へデプロイ（console/ を配信）
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ad-automation
          command: pages deploy console --project-name=sofcom-adops --branch=main
